name: Refresh News Topics

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: refresh-news-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh-news:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          host="${{ secrets.SSH_HOST }}"
          port="${{ secrets.SSH_PORT }}"
          if [ -z "$port" ]; then
            port=22
          fi
          ssh-keyscan -p "$port" -H "$host" >> ~/.ssh/known_hosts

      - name: Run news refresh inside app container
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          port="${SSH_PORT:-22}"
          ssh -p "$port" "${SSH_USER}@${SSH_HOST}" \
            'cd /srv/leesaitool/english-listening-trainer && sudo docker compose --env-file .env.production -f docker-compose.prod.yml exec -T app npm run refresh-news'

      - name: Fetch logs on failure
        if: failure()
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          port="${SSH_PORT:-22}"
          ssh -p "$port" "${SSH_USER}@${SSH_HOST}" \
            'sudo docker logs --tail=200 english-listening-trainer-app-1'
