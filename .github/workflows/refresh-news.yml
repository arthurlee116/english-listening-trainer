name: Refresh News Topics

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: refresh-news-vercel
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger Vercel news refresh route
        env:
          VERCEL_PRODUCTION_URL: ${{ vars.VERCEL_PRODUCTION_URL }}
          VERCEL_CRON_SECRET: ${{ secrets.VERCEL_CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_PRODUCTION_URL:-}" ]; then
            echo "VERCEL_PRODUCTION_URL is not set" >&2
            exit 1
          fi
          if [ -z "${VERCEL_CRON_SECRET:-}" ]; then
            echo "VERCEL_CRON_SECRET is not set" >&2
            exit 1
          fi

          curl \
            --connect-timeout 5 \
            --max-time 120 \
            -fsS \
            -H "Authorization: Bearer ${VERCEL_CRON_SECRET}" \
            "${VERCEL_PRODUCTION_URL}/api/cron/refresh-news"
