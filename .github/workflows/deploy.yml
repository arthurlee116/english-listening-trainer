name: Verify Production Deployment

on:
  push:
    branches: [main]

concurrency:
  group: verify-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Wait for Vercel to finish production deployment
        run: sleep 30

      - name: Health check production deployment
        env:
          VERCEL_PRODUCTION_URL: ${{ vars.VERCEL_PRODUCTION_URL }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_PRODUCTION_URL:-}" ]; then
            echo "VERCEL_PRODUCTION_URL is not set" >&2
            exit 1
          fi

          for i in {1..10}; do
            if curl --connect-timeout 5 --max-time 20 -fsS "${VERCEL_PRODUCTION_URL}/api/health"; then
              exit 0
            fi
            sleep 10
          done

          echo "Health check failed after retries." >&2
          exit 1
